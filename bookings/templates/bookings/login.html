{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flyo Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="{% static 'bookings/style.css' %}">
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="row login-card shadow">
        <div class="p-4 col-md-4 left-panel ">
            <img src="{% static 'bookings/images/LogoFlyo.png' %}" alt="Logo" width="60">
        </div>
        <div class="col-md-8 d-flex align-items-center justify-content-center">
            <div class="w-75 mx-auto py-4">
                <h2>Welcome </h2>
                <p class="fs-5">
                    Login or create account and enjoy using
                    <img
                        src="{% static 'bookings/images/LogoFlyo.png' %}"
                        alt="Logo"
                        width="60"
                        class="ms-2"
                    >
                </p>

                {% if error %}
                  <p class="text-danger">{{ error }}</p>
                {% endif %}

<!--                <h3>Login</h3>-->

                <form method="post">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="login">
<!--                    <input type="email" name="email" placeholder="Email" required>-->
                     <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Email address</label>
                        <input type="email" name="email"  class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" required>
                      </div>
                    <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label">Password</label>
                        <input type="password" name="password"  class="form-control" id="exampleInputPassword1" required>
                    </div>
<!--                    <input type="password" name="password" placeholder="Password" required>-->

                    <button type="submit" class="btn btn-dark">Submit</button>
                </form>

                <hr>

                <p>
                    Don't have an account?
                    <button
                        type="button"
                        class="btn btn-link text-secondary p-0 mb-1"
                        data-bs-toggle="modal"
                        data-bs-target="#registerModal">
                        Create account
                    </button>
                </p>
            </div>


            <div class="modal fade" id="registerModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">

                        <div class="modal-header">
                            <h5 class="modal-title">Create account</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <form method="post">
                            {% csrf_token %}
                            <input type="hidden" name="action" value="register">

                                <div class="modal-body">

                                    <input class="form-control mb-2" type="text" name="first_name" placeholder="First name">

                                    <input class="form-control mb-2" type="text" name="last_name" placeholder="Last name">

                                    <input class="form-control mb-2" type="email" name="email" placeholder="Email">

                                    <input class="form-control mb-2" type="password" name="password" placeholder="Password">

                                </div>

                                <div class="modal-footer">
                                    <button type="button"
                                            class="btn btn-secondary"
                                            data-bs-dismiss="modal">
                                        Cancel
                                    </button>

                                    <button type="submit"
                                            class="btn btn-dark">
                                        Create
                                    </button>
                                </div>

                            </form>

                        </div>
                    </div>
                </div>

        </div>
    </div>
</div>
</body>
</html>
