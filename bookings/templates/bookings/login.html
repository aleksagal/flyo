{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flyo Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'bookings/style.css' %}">
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="row login-card shadow">
        <div class="p-4 col-md-4 left-panel ">
            <img src="{% static 'bookings/images/LogoFlyo.png' %}" alt="Logo" width="60">
        </div>

        <div class="col-md-8 d-flex align-items-center">
            <div class="w-75 mx-auto">
                <h2>Welcome </h2>
                <p class="fs-5">
                    Fill the form for the first time and enjoy usinng
                    <img
                        src="{% static 'bookings/images/LogoFlyo.png' %}"
                        alt="Logo"
                        width="60"
                        class="ms-2"
                    >
                </p>

                <form method="post">
                    {% csrf_token %}

                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="first_name" name="first_name" placeholder="First name">
                        <label for="first_name">First name *</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="last_name" name="last_name" placeholder="Last name">
                        <label for="last_name">Last name *</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="email" name="email" placeholder="Email">
                        <label for="email">Email *</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="text" class="form-control" id="phone" name="phone" placeholder="Phone number">
                        <label for="phone">Phone number *</label>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn btn-dark me-2">Save</button>
                        <button type="reset" class="btn btn-outline-dark">Clear</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
