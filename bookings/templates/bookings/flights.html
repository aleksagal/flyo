{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flights</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'bookings/style.css' %}">
</head>
<body>
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="row login-card shadow">
        <div class="p-4 col-md-4 left-panel">
            <img src="{% static 'bookings/images/LogoFlyo.png' %}" alt="Logo" width="60">
        </div>

        <div class="col-md-8 d-flex align-items-center justify-content-center">
            <div class="w-75 mx-auto py-4">
                <div class="d-flex justify-content-end gap-3 mb-4">
                    <a href="{% url 'reservations' %}" class="btn btn-success">
                        Your reservations
                    </a>
                    <a href="{% url 'logout' %}" class="btn btn-danger">
                        Log out
                    </a>
                </div>
                <h3 class="mt-4">Select the best flight deals</h3>
                <p class="fs-5">
                     Book your flight and choose the best option for your trip.
                </p>
                <div class="scroll-area overflow-auto" style="max-height:500px;">
                {% for destination in destinations %}
                    <div class="card shadow-sm mb-3 w-80 mx-auto">
                        <div class="row align-items-center">
                            <div class="col-md-3">
                                <img src="{{ destination.image.url }}"
                                     class="img-fluid rounded">
                            </div>

                            <div class="col-md-8">
                                <h4>{{ destination.name }}</h4>
                                <h4 class="mb-4">
                                    <span class="text-secondary fs-6">from</span>
                                    ${{ destination.starting_price }}
                                </h4>

                                <a href="{% url 'booking' destination.name %}" class="btn btn-dark">
                                    Book now
                                </a>
                            </div>
                        </div>
                    </div>
                {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
